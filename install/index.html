<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install Athlete Filters</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
            text-align: center;
        }
        .redirect-message {
            padding: 40px;
        }
        .redirect-message p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        a {
            color: #fc4c02;
        }
    </style>
    <script>
        (function() {
            var ua = navigator.userAgent.toLowerCase();
            var chromeStore = "https://chromewebstore.google.com/detail/athlete-filters/gfdihkjoekbhkiifejggkhjnmfbojcgf";
            var firefoxStore = "https://addons.mozilla.org/en-US/firefox/addon/athlete-filters/";

            var url = ua.includes("firefox") ? firefoxStore : chromeStore;
            window.location.replace(url);
        })();
    </script>
</head>
<body>
    <div class="redirect-message">
        <p>Redirecting to the extension store...</p>
        <p>If you are not redirected, choose your browser:</p>
        <p>
            <a href="https://chromewebstore.google.com/detail/athlete-filters/gfdihkjoekbhkiifejggkhjnmfbojcgf">Chrome / Edge / Brave</a>
            &nbsp;|&nbsp;
            <a href="https://addons.mozilla.org/en-US/firefox/addon/athlete-filters/">Firefox</a>
        </p>
    </div>
</body>
</html>
